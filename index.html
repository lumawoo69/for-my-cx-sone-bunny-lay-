<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>💖 For Nang Khan Mon Mon</title>

<style>
body{
  margin:0;
  overflow:hidden;
  height:100vh;
  background: radial-gradient(circle at center,#070012,#000);
  font-family: Arial;
}

/* canvas */
canvas{
  position:absolute;
  top:0;
  left:0;
}

/* glow */
.aura{
  position:absolute;
  width:420px;
  height:420px;
  background:radial-gradient(circle,rgba(255,105,180,0.45),transparent 65%);
  filter:blur(70px);
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  animation:pulse 5s infinite;
}

@keyframes pulse{
  0%{transform:translate(-50%,-50%) scale(1);}
  50%{transform:translate(-50%,-50%) scale(1.35);}
  100%{transform:translate(-50%,-50%) scale(1);}
}

/* TAP */
#tap{
  position:absolute;
  width:100%;
  height:100%;
  display:flex;
  justify-content:center;
  align-items:center;
  background:rgba(0,0,0,0.55);
  z-index:10;
  color:#ffb6c1;
  font-size:18px;
  text-align:center;
}

/* LETTER */
#letterBox{
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%) scale(0.85);
  width:88%;
  max-height:70%;
  overflow-y:auto;

  background:rgba(255,255,255,0.07);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);

  border:1px solid rgba(255,192,203,0.25);
  border-radius:18px;

  padding:20px;
  box-sizing:border-box;

  opacity:0;
  transition:0.6s ease;
  z-index:5;
}

#letterBox.show{
  opacity:1;
  transform:translate(-50%,-50%) scale(1);
}

#letterBox h1{
  text-align:center;
  font-size:20px;
  color:#ffb6c1;
  text-shadow:0 0 10px pink;
}

#letterBox p{
  font-size:15px;
  line-height:1.7;
  color:#ffe4ec;
  white-space:pre-line;
}
</style>
</head>

<body>

<div class="aura"></div>
<canvas id="c"></canvas>

<div id="tap" onclick="start()">💖 TAP TO START 💖</div>

<div id="letterBox">
  <h1>💖 For Nang Khan Mon Mon 💖</h1>
  <p id="text"></p>
</div>

<script>
const canvas=document.getElementById("c");
const ctx=canvas.getContext("2d");

function resize(){
  const dpr=window.devicePixelRatio||1;

  canvas.style.width=window.innerWidth+"px";
  canvas.style.height=window.innerHeight+"px";

  canvas.width=window.innerWidth*dpr;
  canvas.height=window.innerHeight*dpr;

  ctx.setTransform(dpr,0,0,dpr,0,0);
}
resize();
window.addEventListener("resize",resize);

let particles=[];
let stage=0;

class P{
  constructor(x,y){
    this.x=x;
    this.y=y;
    this.tx=x;
    this.ty=y;
  }

  update(){
    this.x+=(this.tx-this.x)*0.06;
    this.y+=(this.ty-this.y)*0.06;
  }

  draw(){
    ctx.fillStyle="white";
    ctx.shadowBlur=10;
    ctx.shadowColor="pink";
    ctx.fillRect(this.x,this.y,2,2);
  }
}

function reset(){
  particles=[];
}

/* 💖 HEART UNIVERSE (MAIN + BACKGROUND FIELD) */
function webHeart(){
  reset();

  let scale=Math.min(window.innerWidth,window.innerHeight)/24;

  // MAIN HEART (CENTER STRONG)
  for(let i=0;i<700;i++){
    let t=Math.random()*Math.PI*2;

    let x=16*Math.pow(Math.sin(t),3);
    let y=-(13*Math.cos(t)-5*Math.cos(2*t)-2*Math.cos(3*t)-Math.cos(4*t));

    let p=new P(Math.random()*window.innerWidth,Math.random()*window.innerHeight);

    p.tx=window.innerWidth/2 + x*scale;
    p.ty=window.innerHeight/2 + y*scale;

    particles.push(p);
  }

  // 🌌 HEART UNIVERSE BACKGROUND FIELD (KEY FIX)
  for(let k=0;k<4;k++){
    let offsetX=(Math.random()-0.5)*window.innerWidth;
    let offsetY=(Math.random()-0.5)*window.innerHeight;

    for(let i=0;i<250;i++){
      let t=Math.random()*Math.PI*2;

      let x=16*Math.pow(Math.sin(t),3);
      let y=-(13*Math.cos(t)-5*Math.cos(2*t)-2*Math.cos(3*t)-Math.cos(4*t));

      let p=new P(Math.random()*window.innerWidth,Math.random()*window.innerHeight);

      p.tx=(window.innerWidth/2 + x*scale) + offsetX*0.2;
      p.ty=(window.innerHeight/2 + y*scale) + offsetY*0.2;

      particles.push(p);
    }
  }
}

/* 💌 ORIGINAL LETTER */
const message=`
💖 Nang Khan Mon Mon 💖

I love you more than words can explain.
I am truly grateful for you.

Thank you for your voice messages, your time, your care.

I feel less alone because of you.

Most of the time I have no one to talk to...
but you stayed, listened, and supported me.

Please don’t stress yourself too much.
You deserve happiness every single day.

I just want to see you smile always 💖

I will always care for you, always stay with you.
`;

function showLetter(){
  document.getElementById("letterBox").classList.add("show");
  document.getElementById("text").innerText=message;
}

/* animation */
function animate(){
  ctx.clearRect(0,0,canvas.width,canvas.height);

  particles.forEach(p=>{
    p.update();
    p.draw();
  });

  requestAnimationFrame(animate);
}
animate();

/* FLOW */
function start(){
  document.getElementById("tap").style.display="none";
  webHeart();
}

/* TAP → LETTER */
window.addEventListener("click",()=>{
  if(stage===0){
    stage=1;
    showLetter();
  }
});
</script>

</body>
</html>
